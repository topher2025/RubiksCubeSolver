{% extends 'base.html' %}

{% block title %}Solution{% endblock %}

{% block content %}
    {% if not e %}
        <p>Original cube: {{ fs }}</p>
        <a href="{{ url_for('cube.save', fs=fs) }}">Save This Cube</a>
        <ol>
            {% for step in solution %}
                <li>{{ step }}</li>
            {% endfor %}
        </ol>
    {% endif %}
{% endblock %}
